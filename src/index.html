<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reprise Bon Iver</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./style/font.css">
    <link rel="stylesheet" href="./style/splash.css">
</head>
<body>
    <section class="js-splash splash">

        <div>
            <div class="splash__cover grid">
                <span>cover of</span>
                <span>Bon Iver</span>
                <span>by</span>
            </div>
            <div class="splash__names grid">
                <a  class="splash__name splash__name--1" href="#">Agathe Lavarel</a>
                <a class="splash__name splash__name--2" href="#">Kalupto</a>
                <span>
                    <button class="js-play-audio splash__play js-remove-splash">Discover</button>

                </span>
            </div>
        </div>

        <img class="splash__logo" src="/img/michicant.png" alt="">
    </section>
    <!-- <h1>RESIDENCE THAILAND POC</h1> -->
    <video autoplay muted loop id="noise" playsinline class="js-video-texture" src="/videos/noise.mp4" ></video>
    <video autoplay muted loop id="snow" playsinline class="js-video-texture"  src="/videos/snow.mp4" ></video>
    <video autoplay muted loop id="water" playsinline class="js-video-texture"  src="/videos/water.mp4" ></video>
    <canvas class="webgl"></canvas>
    <!-- <button class="js-debug-camera button-camera">debug camera position rotation</button> -->
    <button class="js-play-audio">pause</button>

    <audio  class="js-audio"  src="/audios/Michicant.mp3" ></audio>
    <script type="module" src="./script.js"></script>
</body>
</html>
